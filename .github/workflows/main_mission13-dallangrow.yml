name: Build and deploy ASP.Net Core app to Azure Web App - Mission13-DallanGrow

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ./backend/backend.csproj

      - name: Build with dotnet
        run: dotnet build ./backend/backend.csproj --configuration Release --no-restore

      - name: dotnet publish
        run: dotnet publish ./backend/backend.csproj -c Release -o "${{env.DOTNET_ROOT}}/myapp" --no-build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_FB6B9ED5CEF9464AA68168B3B1167B80 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_BC7D70E04BE94BD4B924860CE170EF77 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_7EA7B6B7C0A54874BCE225DFCE4CFFA8 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Mission13-DallanGrow'
          slot-name: 'Production'
          package: .